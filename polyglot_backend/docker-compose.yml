services:
  postgres:
    image: postgres:16
    container_name: canteen-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  fastapi:
    build:
      context: .
      dockerfile: fastapi_service/Dockerfile
    container_name: canteen-fastapi
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: ${DATABASE_URL}
      FLASK_SERVICE_URL: http://flask:8002
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8001:8001"

  flask:
    build:
      context: .
      dockerfile: flask_service/Dockerfile
    container_name: canteen-flask
    restart: unless-stopped
    env_file:
      - .env
    environment:
      FASTAPI_URL: http://fastapi:8001
    depends_on:
      - fastapi
    ports:
      - "8000:8002"

  django:
    build:
      context: .
      dockerfile: django_service/Dockerfile
    container_name: canteen-django
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: ${DATABASE_URL}
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8003:8003"

volumes:
  postgres_data: